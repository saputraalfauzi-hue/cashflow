<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="google-site-verification" content="UaNHO3jVnXeDpZKQAfgA3ooXCy3PYQWhED0BBvxtun0" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CashFlow Manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>CashFlow</h1>
            <button id="themeToggle" class="theme-btn"><i class="fas fa-moon"></i></button>
        </div>

        <div class="saldo-card">
            <span class="saldo-label">Saldo Saat Ini</span>
            <span id="saldoValue" class="saldo-value">Rp 0</span>
        </div>

        <div class="form-card">
            <select id="jenis">
                <option value="pemasukan">Pemasukan</option>
                <option value="pengeluaran">Pengeluaran</option>
            </select>
            <input type="text" id="keterangan" placeholder="Keterangan (contoh: Makan, Gaji)" autocomplete="off">
            <input type="text" id="jumlah" placeholder="Jumlah (contoh: 500000)" autocomplete="off" inputmode="numeric">
            <button id="submitBtn" class="btn-primary">Tambah Transaksi</button>
        </div>

        <div class="charts-section">
            <div class="chart-switch">
                <button id="btnPie" class="chart-switch-btn active">Lingkaran</button>
                <button id="btnBarDate" class="chart-switch-btn">Per Tanggal</button>
                <button id="btnBarMonth" class="chart-switch-btn">Per Bulan</button>
            </div>
            <div id="pieContainer" class="chart-container active">
                <div class="chart-box">
                    <h3>Perbandingan Pemasukan vs Pengeluaran</h3>
                    <canvas id="pieChart" width="300" height="300"></canvas>
                    <div id="piePersen" class="persen-info"></div>
                </div>
            </div>
            <div id="barDateContainer" class="chart-container">
                <div class="chart-box">
                    <h3>Total per Tanggal (Persegi)</h3>
                    <canvas id="barDateChart" width="400" height="250"></canvas>
                </div>
            </div>
            <div id="barMonthContainer" class="chart-container">
                <div class="chart-box">
                    <h3>Total per Bulan (Persegi)</h3>
                    <canvas id="barMonthChart" width="400" height="250"></canvas>
                </div>
            </div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h3>History Transaksi</h3>
                <select id="filterJenis">
                    <option value="semua">Semua Jenis</option>
                    <option value="pemasukan">Pemasukan</option>
                    <option value="pengeluaran">Pengeluaran</option>
                </select>
            </div>
            <div class="table-wrapper">
                <table id="historyTable">
                    <thead>
                        <tr><th>Jenis</th><th>Keterangan</th><th>Jumlah</th><th>Waktu</th><th>Aksi</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
